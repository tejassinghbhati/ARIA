global:
  scrape_interval: 5s
  evaluation_interval: 15s

rule_files:
  - "alert_rules.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets: []    # configure Alertmanager endpoint here

scrape_configs:
  - job_name: "aria_perception"
    static_configs:
      - targets: ["localhost:9091"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance

  - job_name: "aria_nav_policy"
    static_configs:
      - targets: ["localhost:9092"]

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
